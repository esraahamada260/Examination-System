<!DOCTYPE html>
<html lang="en" class=" selection:bg-[#FFDBB6] selection:text-[#091228]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Page</title>
    <link rel="stylesheet" href="../CSS/styleFirstPage.css">
    <link rel="icon" href="../images/puzzle.png" type="image/png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body class="font-[Poppins] !m-0 bg-[#FFF2EF] dark:bg-[#091228] transition-colors duration-500">

    <div class="circle">
        <div></div>
        <div></div>
    </div>

    <nav class="flex gap-5 items-center justify-between p-4 bg-white dark:bg-[#091228] rounded-full shadow-lg fixed top-[30px] left-[40px] right-[40px] z-50 transition-colors duration-500">
        <div class="logo flex gap-2 items-center justify-center">
            <img src="../images/puzzle.png" alt="logo" class="w-[36px]">
            <p class="uppercase font-bold tracking-tighter text-[#091228] dark:text-[#F7A5A5] text-[24px]">eduvance</p>
        </div>

        <ul class="flex gap-5 capitalize text-[#696969] dark:text-[#FFC284]">
            <li class="hover:bg-[#547792] active:scale-95 hover:text-white pl-3 pr-3 pt-1 pb-1 rounded-full cursor-pointer transition duration-300"><a href="#">home</a></li>
            <li class="hover:bg-[#547792] active:scale-95 hover:text-white pl-3 pr-3 pt-1 pb-1 rounded-full cursor-pointer transition duration-300"><a href="#">about</a></li>
            <li class="hover:bg-[#547792] active:scale-95 hover:text-white pl-3 pr-3 pt-1 pb-1 rounded-full cursor-pointer transition duration-300"><a href="#">contact</a></li>
        </ul>

        <div class="buttons flex gap-2 items-center justify-center">
            <button onclick="signUp()" class="pl-6 pr-6 pt-1 pb-1 capitalize rounded-full bg-[#091228] dark:bg-[#F7A5A5] text-white dark:text-[#091228] border-solid border-[2px] border-[#091228] dark:border-[#F7A5A5] hover:bg-[#547792] hover:border-[#547792] active:scale-95 transition duration-300">sign up</button>
            <p class="font-bold text-[#091228] dark:text-[#F7A5A5]">/</p>
            <button id="login" onclick="login()" class="pl-6 pr-6 pt-1 pb-1 capitalize rounded-full border border-[#F7A5A5] dark:border-[#FFC284] text-[#F7A5A5] dark:text-[#FFC284] hover:bg-[#fcdada] dark:hover:bg-[#091228] hover:text-white active:scale-95 transition duration-300">log in</button>
        </div>
    </nav>

    <main class="min-h-screen flex pt-[60px] gap-[40px] justify-center items-center mt-[10px] mb-[10px] ml-[auto] mr-[auto] flex-wrap">
        
        <section class="right-section flex flex-col w-[50%]">
            <p class="text-[50px] font-bold text-[#091228] dark:text-[#F7A5A5] mb-[40px]">
                Welcome to the <span class="text-[#F7A5A5] dark:text-[#FFC284]">Online Examination</span> System
            </p>
            <p class="text-[#c1c1c1ee] dark:text-[#F6F09F] border-l-solid border-l-[#F7A5A5] dark:border-l-[#FFC284] border-l-[3px] p-[10px]">
                Start your exam journey with a simple and secure online testing system.
            </p>
            <div class="mt-4">
                <button onclick="signUp()" class="pl-6 pr-6 pt-1 pb-1 rounded-full bg-[#091228] dark:bg-[#F7A5A5] text-white dark:text-[#091228] border-solid border-[2px] border-[#091228] dark:border-[#F7A5A5] hover:bg-[#547792] hover:border-[#547792] active:scale-95 transition duration-300">sign up</button>
                <button id="login" onclick="login()" class="pl-6 pr-6 pt-1 pb-1 rounded-full border border-[#F7A5A5] dark:border-[#FFC284] text-[#F7A5A5] dark:text-[#FFC284] hover:bg-[#fcdada] dark:hover:bg-[#091228] hover:text-white active:scale-95 transition duration-300">log in</button>
            </div>
        </section>

        <section class="left-section">
            <div>
                <img src="../images/pexels-mikhail-nilov-9158999.jpg" alt="image" class="rounded-lg">
            </div>

            <div class="mt-4 flex flex-wrap gap-2">
                <img src="../images/exploration.png" alt="image" class="rounded-lg">
                <img src="../images/pexels-mba-classroom-2155665220-34947114.jpg" alt="img" class="rounded-lg">
            </div>
        </section>
    </main>

    <!-- Dark Mode Toggle Button -->
    <div class="fixed bottom-5 right-5 z-50">
        <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-[#091228] text-white dark:bg-[#F7A5A5] dark:text-[#091228] transition duration-300">Toggle Dark Mode</button>
    </div>

    <script src="../JS/script.js"></script>
    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
</body>
</html>
