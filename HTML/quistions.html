<!DOCTYPE html>
<html lang="ar" class="selection:bg-[#FFDBB6] selection:text-[#091228]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="../images/exam-time.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../CSS/quistions.css">


  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="p-4 bg-[#FFF2EF] font-[Poppins]">
    <!-- Main div -->
    <div
        class="card max-w-[1300px] mx-auto shadow-2xl rounded-3xl bg-white overflow-hidden grid grid-cols-1 md:grid-cols-3 gap-6 p-8 relative">
        <!-- Head -->
        <div class="p-8 md:p-12 col-span-2">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
                <h2 class="text-3xl font-bold text-[#091228]">Exam Session</h2>


                <div class="flex items-center gap-4">
                    <div class="flex flex-col items-center"> 
                        <span id="timerRemainding" class="text-xs text-gray-500 mb-1"></span>
                         <progress id="timer" class="progress progress-info w-40 h-2" value="100" max="100"></progress>
                   </div>
                    <div id="questionCounter" class="bg-[#FFF2EF] p-3 rounded-xl text-sm font-semibold"></div>
                </div>
            </div>

            <hr>

            <!-- Quistion -->
            <div id="questionCounter" class="my-5">
                <h3 class="text-xl font-bold text-gray-800 mb-4"></h3>
                <!-- Answers -->
                <div id="answers"></div>
            </div>

            <hr>

            <!-- Buttons -->
            <div class="my-4 flex flex-wrap justify-between items-center gap-4">
                <div class="flex gap-2">
                    <!-- class=" mt-[50px] p-[10px] border-none rounded-full w-[200px] dark:bg-[#FFF2EF] capitalize cursor-pointer active:scale-95 transition duration-300 bg-[#ffdbb656] text-white hover:bg-[#f7a5a5] hover:text-white hover:shadow-lg hover:shadow-[#707070ee] -->
                    <button onclick="prev()" class="btn btn-ghost border-gray-300 capitalize p-[10px] rounded-full pl-[20px] pr-[20px] hover:bg-[#333f61f0] hover:text-white hover:shadow-lg w-[100px]">Previous</button>
                    <button id="nextBtn" onclick="next()" class="btn btn-ghost bg-[#091228] text-white capitalize p-[10px] rounded-full pl-[20px] pr-[20px] hover:bg-[#F7A5A5] hover:shadow-lg w-[100px]">Next</button>
                </div>

                <div>
                    <button class="btn btn-outline border-1 rounded-full border-[#F7A5A5] text-[#F7A5A5] hover:bg-transparent hover:border-[#091228] hover:text-[#091228] hover:shadow-lg hover:shadow-[#cacaca]" onclick="flagQuestion()">
                        <?xml version="1.0" ?>
                        <svg id="Guide" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
                            <defs>
                                <style>
                                    .cls-1 {
                                        fill: #091228;
                                    }
                                </style>
                            </defs>
                            <title />
                            <path class="cls-1"
                                d="M26,2H6A1,1,0,0,0,5,3V28a1,1,0,0,0,1.51.86L16,23.17l9.49,5.69A1,1,0,0,0,26,29a1,1,0,0,0,.49-.13A1,1,0,0,0,27,28V3A1,1,0,0,0,26,2ZM25,4V8H7V4ZM16.51,21.14a1,1,0,0,0-1,0L7,26.23V10H25V26.23Z" />
                        </svg>
                        Flag for Review
                    </button>

                    <button class="btn btn-outline border-1 rounded-full border-[#F7A5A5] text-[#F7A5A5] hover:bg-transparent hover:border-[#091228] hover:text-[#091228] hover:shadow-lg hover:shadow-[#cacaca]" onclick="unflagQuestion()">
                        <?xml version="1.0" ?>
                        <!DOCTYPE svg
                            PUBLIC '-//W3C//DTD SVG 1.1//EN' 'http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd'>
                        <svg id="Layer_1" style="enable-background:new 0 0 64 64;" version="1.1" viewBox="0 0 64 64"
                            xml:space="preserve" xmlns="http://www.w3.org/2000/svg"
                            xmlns:xlink="http://www.w3.org/1999/xlink" width="25" height="25">
                            <style type="text/css">
                                .st0 {
                                    fill: #091228;
                                }
                            </style>
                            <g>
                                <g id="Icon-Trash" transform="translate(232.000000, 228.000000)">
                                    <polygon class="st0" id="Fill-6"
                                        points="-207.5,-205.1 -204.5,-205.1 -204.5,-181.1 -207.5,-181.1" />
                                    <polygon class="st0" id="Fill-7"
                                        points="-201.5,-205.1 -198.5,-205.1 -198.5,-181.1 -201.5,-181.1" />
                                    <polygon class="st0" id="Fill-8"
                                        points="-195.5,-205.1 -192.5,-205.1 -192.5,-181.1 -195.5,-181.1" />
                                    <polygon class="st0" id="Fill-9"
                                        points="-219.5,-214.1 -180.5,-214.1 -180.5,-211.1 -219.5,-211.1" />
                                    <path class="st0"
                                        d="M-192.6-212.6h-2.8v-3c0-0.9-0.7-1.6-1.6-1.6h-6c-0.9,0-1.6,0.7-1.6,1.6v3h-2.8v-3c0-2.4,2-4.4,4.4-4.4h6c2.4,0,4.4,2,4.4,4.4V-212.6"
                                        id="Fill-10" />
                                    <path class="st0"
                                        d="M-191-172.1h-18c-2.4,0-4.5-2-4.7-4.4l-2.8-36l3-0.2l2.8,36c0.1,0.9,0.9,1.6,1.7,1.6h18c0.9,0,1.7-0.8,1.7-1.6l2.8-36l3,0.2l-2.8,36C-186.5-174-188.6-172.1-191-172.1"
                                        id="Fill-11" />
                                </g>
                            </g>
                        </svg>
                        Unflag question
                    </button>
                </div>
            </div>

        </div>

            <img src="../images/tl.webp" alt="img" class="w-[100px] absolute">

            <div id="flaggedContainer"
            class="col-span-1 rounded-3xl overflow-hidden p-4 border-solid border-[1px] border-[#FFDBB6] ">
            <p class="text-center capitalize font-bold text-[#091228] text-[17px] mb-[20px]">flagged queastions</p>
            </div>

    </div>

      <!-- <div class="bg-white rounded-xl m-[50px] ml-auto mr-auto hidden p-[20px] flex justify-center flex-col-reverse items-center w-[50%] shadow-2xl">
        <img src="images/633-Photoroom.png" alt="img" class="w-[45%] ">
        <p class="capitalize font-extrabold font-[Poppins] text-center text-2xl text-red-500 ">sorry the time is out!!!</p>
     </div> -->

<div id="timeUpModal" class="fixed hidden inset-0 bg-black/50 flex justify-center items-center">

    <div class="bg-white rounded-xl p-6 w-[30%] shadow-2xl text-center flex flex-col items-center gap-5">
        <img src="../images/633-removebg-preview.png" alt="img" class="w-[50%] mx-auto">
        <p class="capitalize text-xl text-red-500 ">
            Sorry, the time is out!!!
        </p>
        <button id="result" class="p-[10px] border-none rounded-full w-[200px]  capitalize cursor-pointer active:scale-95 transition duration-300 bg-[#091228] text-white hover:bg-[#121f3f] hover:text-white hover:shadow-lg hover:shadow-[#707070ee]">see results</button>
    </div>

</div>


<!-- bg-gradient-to-r from-[#132651d6] to-[#db979791]  -->
    <script src="../JS/quistions.js"></script>
</body>
</html>
