<!DOCTYPE html>
<html lang="en" class="selection:bg-[#FFDBB6] selection:text-[#091228]">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
     <link rel="icon" href="../images/puzzle.png" type="image/png" />


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


    <!-- <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" /> -->
    <title>Review Answers</title>
</head>

<body class="p-4 bg-[#FFF2EF]">
    <div class="max-w-5xl mx-auto bg-white rounded-2xl p-8  shadow-lg shadow-[#d3d3d3]">
        <h1 class="text-3xl font-bold text-[#091228] font-[Poppins]">
            Exam Review
        </h1>

        <div id="reviewContainer" class="my-5 font-[Poppins]"></div>

        <div class="flex justify-between">
            <button id="backBtn" class="btn btn-ghost bg-[#091228] font-[Poppins] text-white font-bold capitalize p-[10px] rounded-full pl-[20px] pr-[20px] hover:bg-[#F7A5A5] hover:shadow-lg hover:shadow-[#F7A5A5]">
                Back To Result
            </button>

            <button id="logOutBtn"
                class="btn btn-ghost bg-[#e00909] text-white font-[Poppins] font-bold capitalize p-[10px] rounded-full pl-[20px] pr-[20px] hover:bg-[#bc0b0b] hover:shadow-lg hover:shadow-[#bc0b0b]">
                Log out
            </button>
        </div>
    </div>

    <script src="../JS/review.js"></script>
</body>

</html>
